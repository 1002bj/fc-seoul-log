<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FC SEOUL TRAINING LOG</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FC SEOUL">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/f/ff/FC_Seoul_logotype.png">
<link rel="shortcut icon" href="https://upload.wikimedia.org/wikipedia/commons/f/ff/FC_Seoul_logotype.png">

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{ --red:#E30613; --black:#1a1a1a; --gold:#C5A059; --bg:#334155; --salmon:#F5B7B1; }
*{ box-sizing:border-box; -webkit-print-color-adjust:exact; }
body{ margin:0; font-family:'Apple SD Gothic Neo', sans-serif; background:var(--bg); }

#loginScreen{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.login-card{ background:white; width:380px; max-width:100%; border-radius:10px; overflow:hidden; box-shadow:0 15px 50px rgba(0,0,0,.5); }
.login-head{ background:var(--black); border-top:6px solid var(--red); color:white; padding:22px; text-align:center; }
.login-head h1{ margin:0; font-size:20px; font-weight:900; }
.login-head p{ margin:4px 0 0; font-size:11px; color:#94a3b8; }
.login-body{ padding:22px; }
.login-body label{ font-size:11px; font-weight:bold; color:#64748b; display:block; margin-bottom:4px; }
.login-body input, .login-body select{ width:100%; padding:9px; margin-bottom:12px; border:1px solid #ddd; border-radius:5px; font-size:13px; }
.btn{ display:block; width:100%; padding:10px; border:none; border-radius:5px; font-weight:bold; font-size:13px; cursor:pointer; margin-bottom:8px; }
.btn-red{ background:var(--red); color:white; }
.btn-black{ background:var(--black); color:white; }
.btn-outline{ background:white; color:var(--black); border:1px solid #cbd5e1; }
.toggle-link{ text-align:center; font-size:12px; color:#0284c7; cursor:pointer; margin-top:4px; }
.err{ color:var(--red); font-size:11.5px; margin:-4px 0 10px; min-height:14px; font-weight:bold; }
.cfg-box{ background:#f8fafc; border:1px dashed #cbd5e1; border-radius:6px; padding:8px; margin-bottom:14px; }
.cfg-box small{ color:#64748b; font-size:10px; }

#appScreen{ display:none; }
.topbar{ background:var(--black); color:white; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:4px solid var(--red); position:sticky; top:0; z-index:50; flex-wrap:wrap; gap:6px; }
.topbar .brand{ font-weight:900; }
.topbar .brand span{ color:var(--red); }
.topbar .userinfo{ font-size:12px; color:#cbd5e1; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.topbar button{ background:#334155; color:white; border:none; padding:6px 12px; border-radius:4px; font-size:11.5px; cursor:pointer; }

.layout{ display:flex; min-height:calc(100vh - 53px); }
.sidebar{ width:300px; background:white; padding:16px; flex-shrink:0; border-right:1px solid #cbd5e1; overflow-y:auto; }
.sidebar h3{ font-size:12px; color:var(--red); border-bottom:2px solid var(--gold); display:inline-block; padding-bottom:3px; margin:14px 0 10px; }
.sidebar h3:first-child{ margin-top:0; }
.sidebar select, .sidebar input, .sidebar textarea{ width:100%; padding:7px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px; font-size:12.5px; }
.mode-toggle{ display:flex; gap:6px; margin-bottom:14px; }
.mode-toggle button{ flex:1; padding:9px 4px; border:1px solid #cbd5e1; background:#f8fafc; border-radius:6px; font-size:12px; font-weight:bold; cursor:pointer; }
.mode-toggle button.active{ background:var(--red); color:white; border-color:var(--red); }
.list-item{ padding:8px 10px; border:1px solid #e2e8f0; border-radius:5px; margin-bottom:6px; font-size:11.5px; display:flex; justify-content:space-between; align-items:center; }
.list-item:hover{ background:#f8fafc; }
.main{ flex:1; padding:20px; overflow:auto; }
.empty{ color:white; text-align:center; margin-top:60px; font-size:14px; }

.perm-row{ display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #eee; font-size:12px; }
.perm-row button{ font-size:10.5px; padding:4px 8px; border-radius:4px; border:none; cursor:pointer; color:white; }

.card{ background:white; border-radius:8px; padding:20px; max-width:1000px; margin:0 auto; }
#journalCard{ width:1050px; max-width:100%; padding:30px 35px; border-top:15px solid var(--red); box-shadow:0 10px 30px rgba(0,0,0,.3); }
.j-title{ text-align:center; font-size:20px; font-weight:900; margin-bottom:14px; }
.j-meta{ text-align:right; font-size:11px; color:#64748b; margin-bottom:6px; }
table.j-table{ width:100%; border-collapse:collapse; }
table.j-table th{ background:var(--red); color:white; font-size:11.5px; padding:10px 6px; border:1px solid #c0050f; }
table.j-table td{ border:1px solid #cbd5e1; padding:5px; font-size:11px; vertical-align:middle; }
td.goal-cell{ background:var(--salmon); }
tr.goal-row td:first-child, tr.score-row td:first-child, tr.video-row td:first-child{ background:#f1f5f9; font-weight:bold; text-align:center; }
.goal-cell textarea{ width:100%; border:none; background:transparent; resize:none; font-size:11px; font-family:inherit; min-height:38px; }
.tap-row{ display:flex; align-items:center; justify-content:center; gap:3px; flex-wrap:wrap; }
.tap-btn{ width:22px; height:22px; border-radius:50%; border:1px solid #cbd5e1; background:white; font-size:10px; font-weight:bold; cursor:pointer; padding:0; }
.tap-btn.active{ background:var(--red); border-color:var(--red); color:white; }
.tap-btn.half{ background:var(--gold); border-color:var(--gold); color:white; }
.tap-btn:disabled{ opacity:.4; cursor:default; }
.tap-val{ font-size:11px; font-weight:900; color:#0369a1; margin-left:4px; min-width:22px; }
.video-cell{ display:flex; flex-direction:column; gap:3px; }
.video-cell input{ width:100%; font-size:9.5px; padding:3px; border:1px solid #ddd; border-radius:3px; }
.video-cell a{ font-size:10px; color:#0284c7; font-weight:bold; text-decoration:none; }
.video-cell button{ font-size:9px; padding:2px 4px; background:#f1f5f9; border:1px solid #cbd5e1; border-radius:3px; cursor:pointer; }
.legend-row{ display:flex; flex-wrap:wrap; gap:14px; margin-top:16px; justify-content:center; font-size:11px; }
.legend-row span.dot{ width:11px; height:11px; border-radius:50%; display:inline-block; margin-right:5px; }
.charts-row{ display:flex; justify-content:center; gap:60px; margin-top:20px; flex-wrap:wrap; }
.chart-box{ width:260px; text-align:center; }
.chart-box h4{ font-size:12px; margin-bottom:6px; }
.note-box{ margin-top:14px; border-radius:6px; padding:14px 18px; border-left:8px solid; }
.note-box textarea{ width:100%; border:1px solid #e2e8f0; border-radius:5px; padding:8px; font-size:12px; font-family:inherit; resize:vertical; }
.actions-row{ display:flex; gap:8px; justify-content:center; margin:16px auto; max-width:1050px; flex-wrap:wrap; }
.actions-row button{ padding:8px 16px; border:none; border-radius:5px; font-size:12px; font-weight:bold; cursor:pointer; color:white; }

#diaryViewCard{ max-width:600px; border-top:10px solid var(--red); box-shadow:0 10px 30px rgba(0,0,0,.3); }
#diaryViewCard img{ width:100%; border-radius:6px; margin-bottom:12px; }
.diary-item{ display:flex; align-items:center; gap:8px; padding:6px; border:1px solid #e2e8f0; border-radius:6px; margin-bottom:6px; cursor:pointer; font-size:11px; }
.diary-item img{ width:38px; height:38px; object-fit:cover; border-radius:4px; }
.diary-item:hover{ background:#f8fafc; }

#growthModal{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; align-items:center; justify-content:center; }
#growthModal .box{ background:white; width:600px; max-width:92vw; border-radius:8px; border-top:8px solid var(--red); padding:20px; }

#loadingOverlay{ position:fixed; inset:0; background:rgba(0,0,0,.25); z-index:9999; display:none; align-items:center; justify-content:center; }
#loadingOverlay .box{ background:white; padding:16px 24px; border-radius:8px; border-top:6px solid var(--red); font-size:13px; font-weight:bold; }
#autoSaveToast{ position:fixed; bottom:16px; right:16px; background:#16a34a; color:white; padding:8px 16px; border-radius:20px; font-size:11.5px; font-weight:bold; z-index:9999; opacity:0; transition:opacity .3s; }

@media print{
  body *{ visibility:hidden; }
  #journalCard, #journalCard *{ visibility:visible; }
  #journalCard{ position:absolute; top:0; left:0; width:100%; box-shadow:none; }
}

@media (max-width: 820px){
  .layout{ flex-direction:column; min-height:auto; }
  .sidebar{ width:100%; border-right:none; border-bottom:4px solid var(--red); max-height:60vh; overflow-y:auto; }
  .main{ padding:12px; }
  #journalCard{ width:100%; padding:16px 12px; }
  .j-title{ font-size:16px; }
  table.j-table{ font-size:9.5px; }
  table.j-table th{ padding:6px 3px; }
  .tap-btn{ width:26px; height:26px; font-size:11px; }
  .chart-box{ width:140px; }
  .card{ padding:14px; }
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-head">
      <h1>FC SEOUL <span style="color:var(--red)">TRAINING LOG</span></h1>
      <p>선수 개인 훈련일지 (드리블 · 패스 · 터치 주기화 · 포토 일지)</p>
    </div>
    <div class="login-body">

      <div id="googleBtnContainer" style="margin-bottom:10px; display:flex; justify-content:center;"></div>
      <div class="err" id="googleError"></div>

      <div class="cfg-box" id="backendConfigBox">
        <label>백엔드 URL</label>
        <input type="text" id="backendUrl" placeholder="https://script.google.com/macros/s/.../exec">
      </div>
      <div class="cfg-box" id="googleConfigBox">
        <label>구글 로그인용 Client ID</label>
        <input type="text" id="googleClientId" placeholder="xxxxx.apps.googleusercontent.com" onchange="waitForGoogleThenInit()">
      </div>
      <div id="showConfigToggle" style="display:none; text-align:center; margin-bottom:10px;">
        <span class="toggle-link" onclick="toggleConfigBoxes()">⚙ 서버 설정 보기/변경 (관리자용)</span>
      </div>
      <hr style="margin:14px 0; border:0; border-top:1px solid #eee;">

      <div id="loginForm">
        <label>아이디</label>
        <input type="text" id="loginId">
        <label>비밀번호</label>
        <input type="password" id="loginPw">
        <div class="err" id="loginError"></div>
        <button class="btn btn-red" onclick="doLogin()">로그인</button>
        <div class="toggle-link" onclick="toggleForm('register')">계정이 없으신가요? 회원가입</div>
      </div>

      <div id="registerForm" style="display:none;">
        <label>아이디</label>
        <input type="text" id="regId">
        <label>비밀번호</label>
        <input type="password" id="regPw">
        <label>이름</label>
        <input type="text" id="regName">
        <label>역할</label>
        <select id="regRole"><option value="player">선수</option><option value="coach">지도자</option></select>
        <label>프로필 사진 (선택)</label>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
          <img id="regPhotoPreview" src="" style="width:48px; height:48px; border-radius:50%; object-fit:cover; background:#f1f5f9; border:1px solid #cbd5e1; display:none;">
          <input type="file" id="regPhoto" accept="image/*" onchange="handleRegPhoto(event)" style="flex:1;">
        </div>
        <div class="err" id="regError"></div>
        <button class="btn btn-black" onclick="doRegister()">회원가입</button>
        <div class="toggle-link" onclick="toggleForm('login')">이미 계정이 있으신가요? 로그인</div>
      </div>

      <div id="googleRegisterForm" style="display:none;">
        <p style="font-size:12px; color:#64748b; margin-top:0;"><b id="googleRegName"></b>님, 처음 로그인이시네요.</p>
        <label>프로필 사진</label>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
          <img id="googleRegPhotoPreview" src="" style="width:48px; height:48px; border-radius:50%; object-fit:cover; background:#f1f5f9; border:1px solid #cbd5e1; display:none;">
          <input type="file" id="googleRegPhoto" accept="image/*" onchange="handleGoogleRegPhoto(event)" style="flex:1;">
        </div>
        <label>역할</label>
        <select id="googleRegRole"><option value="player">선수</option><option value="coach">지도자</option></select>
        <label>비밀번호 (선택 — 설정하면 아이디/비밀번호로도 로그인 가능)</label>
        <input type="password" id="googleRegPw" placeholder="비워두면 구글 로그인만 사용">
        <div class="err" id="googleRegError"></div>
        <button class="btn btn-red" onclick="finishGoogleRegister()">가입 완료</button>
      </div>

    </div>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <div class="brand">FC SEOUL <span>TRAINING LOG</span></div>
    <div class="userinfo">
      <img id="userAvatar" src="" style="width:26px; height:26px; border-radius:50%; object-fit:cover; display:none;">
      <span id="userLabel"></span>
      <button onclick="exportExcel()"><i class="fa fa-file-excel"></i> 엑셀 내보내기</button>
      <button onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="mainArea">
      <div id="dashboardWrapper" style="display:none;"><div id="dashboardCard" class="card" style="border-top:10px solid var(--red);"></div></div>
      <div id="byTypeWrapper" style="display:none;"><div id="byTypeCard" class="card" style="border-top:10px solid var(--gold);"></div></div>
      <div id="journalWrapper" style="display:none;">
        <div class="actions-row" id="journalActionsRow"></div>
        <div id="journalCard"></div>
      </div>
      <div id="diaryViewWrapper" style="display:none;"><div id="diaryViewCard" class="card"></div></div>
      <div class="empty" id="emptyMsg">왼쪽에서 메뉴를 선택해보세요.</div>
    </div>
  </div>

  <div id="growthModal">
    <div class="box">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h3 style="margin:0;">주차별 성장 추이</h3>
        <button onclick="closeGrowthChart()" style="border:none; background:none; font-size:18px; cursor:pointer;">&times;</button>
      </div>
      <canvas id="growthCanvas" height="260"></canvas>
      <div id="growthEmpty" style="display:none; text-align:center; color:#94a3b8; font-size:12px; padding:20px;">저장된 일지가 2개 이상 있어야 비교할 수 있어요.</div>
    </div>
  </div>
</div>

<script>
/* 관리자 설정: 값이 있으면 선수/지도자는 아무 설정 없이 바로 사용 가능 */
const DEFAULT_BACKEND_URL = "https://script.google.com/macros/s/AKfycbz_20iWlLdSBxGhuZ71F27zWi9jB7dSd0803FVA1Wsw6685O9af7iriwL2b9lsSXvXkJQ/exec";
const DEFAULT_GOOGLE_CLIENT_ID = "262306396356-8j941hmfg2hntnaiqm5s6aqhddk35qj1.apps.googleusercontent.com";

const JOURNAL_TYPES = {
  dribble: { title: "드리블 주기화", categories: ["상황인지 + 속도변화 (소유)","볼소유를 위한 드리블 (소유)","도전적인 드리블 + 슈팅 (전진)","전진적인 드리블 + 득점 (전진)","2대2, 3대2 수비"] },
  pass:    { title: "패스 주기화",   categories: ["상황인지 후 패스 연결","볼 소유를 위한 패스선택","공격적인 패스선택,움직임 (전진)","전진하기 위한 도전적인 패스,움직임(전진)","공수전환 시도 & 협력수비"] },
  touch:   { title: "터치 주기화",   categories: ["목적이 있는 터치 (공간,수비위치) 넓이","상황인지 볼소유를 위한 (소유) 터치","터치의 방향성 (공격적) (전진)","득점을 위한 터치 (터치)","1대1,2대2 수비"] }
};
const DAYS = ["월","화","수","목","금","경기"];
const PALETTE = ["#F4C430","#F2994A","#EB5B2F","#E12F2F","#8B1E1E"];

const avg = arr => !arr || !arr.length ? 0 : Math.round(arr.reduce((a,b)=>a+(b||0),0)/arr.length*10)/10;
const dateStr = d => d.toISOString().slice(0,10);
const monday = d => { const dt=new Date(d); const day=dt.getDay(); dt.setDate(dt.getDate()-day+(day===0?-6:1)); dt.setHours(0,0,0,0); return dt; };
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let currentUser = null, currentType = "dribble", currentEntry = null;
let currentPlayerId = null, currentPlayerName = null, sidebarMode = "cycle";
let regPhotoData = "", googleRegPhotoData = "", pendingGoogleAuth = null, pendingDiaryPhoto = null;
let playersInfo = {}, diaryListCache = [], byTypeCache = null;
let playerChart, coachChart, growthChart, autoSaveTimer;

/* ---------- 초기화 / 공통 ---------- */
window.onload = () => {
  const url = DEFAULT_BACKEND_URL || localStorage.getItem('tj_url');
  if (url) { document.getElementById('backendUrl').value = url; localStorage.setItem('tj_url', url); }

  const clientId = DEFAULT_GOOGLE_CLIENT_ID || localStorage.getItem('tj_gid');
  if (clientId) { document.getElementById('googleClientId').value = clientId; localStorage.setItem('tj_gid', clientId); waitForGoogleThenInit(); }

  if (DEFAULT_BACKEND_URL) {
    document.getElementById('backendConfigBox').style.display = 'none';
    document.getElementById('googleConfigBox').style.display = DEFAULT_GOOGLE_CLIENT_ID ? 'none' : 'block';
    document.getElementById('showConfigToggle').style.display = 'block';
  }

  const savedUser = JSON.parse(localStorage.getItem('tj_user') || 'null');
  if (savedUser && url) { currentUser = savedUser; enterApp(); }
};

function toggleConfigBoxes(){
  const show = document.getElementById('backendConfigBox').style.display === 'none';
  document.getElementById('backendConfigBox').style.display = show ? 'block' : 'none';
  document.getElementById('googleConfigBox').style.display = show ? 'block' : 'none';
}
function toggleForm(which){
  document.getElementById('loginForm').style.display = which==='login' ? 'block':'none';
  document.getElementById('registerForm').style.display = which==='register' ? 'block':'none';
}
function backendUrl(){ const v=document.getElementById('backendUrl').value.trim(); if(v) localStorage.setItem('tj_url', v); return v; }

async function api(payload, silent){
  const url = backendUrl();
  if (!url) { if(!silent) alert('백엔드 URL을 먼저 입력해주세요.'); return {ok:false}; }
  if (!silent) loading(true);
  try {
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(payload) });
    return await res.json();
  } catch (err) {
    if (!silent) alert('서버 통신 오류: ' + err);
    return { ok:false, error:String(err) };
  } finally { if (!silent) loading(false); }
}

function loading(on){
  let el = document.getElementById('loadingOverlay');
  if (!el) {
    el = document.createElement('div'); el.id = 'loadingOverlay';
    el.innerHTML = '<div class="box"><i class="fa fa-spinner fa-spin" style="color:var(--red); margin-right:8px;"></i>서버와 통신 중...</div>';
    document.body.appendChild(el);
  }
  el.style.display = on ? 'flex' : 'none';
}
function toast(msg){
  let el = document.getElementById('autoSaveToast');
  if (!el) { el = document.createElement('div'); el.id='autoSaveToast'; document.body.appendChild(el); }
  el.innerHTML = '<i class="fa fa-check"></i> ' + msg;
  el.style.opacity = '1';
  clearTimeout(el._t); el._t = setTimeout(()=> el.style.opacity='0', 1500);
}

/* ---------- 로그인 / 회원가입 ---------- */
function compressImage(file, maxDim, quality, onDone){
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      let w=img.width, h=img.height;
      if (w>maxDim || h>maxDim) { if (w>=h){ h=Math.round(h*maxDim/w); w=maxDim; } else { w=Math.round(w*maxDim/h); h=maxDim; } }
      const c = document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      onDone(c.toDataURL('image/jpeg', quality));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ---------- 구글 로그인 ---------- */
function waitForGoogleThenInit(){
  const clientId = document.getElementById('googleClientId').value.trim();
  if (clientId) localStorage.setItem('tj_gid', clientId);
  if (!clientId) return;
  let tries = 0;
  const timer = setInterval(() => {
    tries++;
    if (window.google && google.accounts && google.accounts.id) {
      clearInterval(timer); initGoogle(clientId);
    } else if (tries > 50) {
      clearInterval(timer);
      document.getElementById('googleError').innerText = '구글 로그인 스크립트를 불러오지 못했습니다.';
    }
  }, 100);
}
function initGoogle(clientId){
  try {
    google.accounts.id.initialize({ client_id: clientId, callback: onGoogleCredential });
    const box = document.getElementById('googleBtnContainer'); box.innerHTML = '';
    google.accounts.id.renderButton(box, { theme:'outline', size:'large', text:'signin_with', width:260 });
  } catch (e) { document.getElementById('googleError').innerText = '구글 로그인 초기화 실패: ' + e; }
}
async function onGoogleCredential(response){
  const clientId = document.getElementById('googleClientId').value.trim();
  const err = document.getElementById('googleError'); err.innerText = '';
  const res = await api({ action:'googleLogin', idToken: response.credential, clientId });
  if (res.ok) { setUser(res.user); }
  else if (res.needsRegister) {
    pendingGoogleAuth = { idToken: response.credential, clientId, photo: res.photo || '' };
    googleRegPhotoData = '';
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('googleRegisterForm').style.display = 'block';
    document.getElementById('googleRegName').innerText = res.name || res.email;
    document.getElementById('googleRegPw').value = '';
    const prev = document.getElementById('googleRegPhotoPreview');
    if (res.photo) { prev.src = res.photo; prev.style.display = 'inline-block'; } else prev.style.display = 'none';
  } else { err.innerText = res.error; }
}
async function finishGoogleRegister(){
  if (!pendingGoogleAuth) return;
  const role = document.getElementById('googleRegRole').value;
  const pw = document.getElementById('googleRegPw').value;
  const photo = googleRegPhotoData || pendingGoogleAuth.photo || '';
  const err = document.getElementById('googleRegError');
  const res = await api({ action:'googleRegister', idToken: pendingGoogleAuth.idToken, clientId: pendingGoogleAuth.clientId, role, pw, photo });
  if (res.ok) { pendingGoogleAuth = null; document.getElementById('googleRegisterForm').style.display='none'; setUser(res.user); }
  else { err.innerText = res.error; }
}

/* ---------- 전체 대시보드 ---------- */
async function showDashboard(){
  const res = await api({ action:'getAllData', requesterId: currentUser.id });
  if (!res.ok) { alert(res.error); return; }
  hidePanels(); document.getElementById('dashboardWrapper').style.display = 'block';

  const players = res.users.filter(u => u.role==='player');
  const thisMonday = dateStr(monday(new Date()));
  const types = Object.keys(JOURNAL_TYPES);
  let pSum=0, pCnt=0, cSum=0, cCnt=0;

  const rows = players.map(p => {
    const cells = types.map(t => {
      const es = res.entries.filter(e => e.playerId===p.id && e.type===t && e.playerScores).sort((a,b)=> new Date(b.weekStartDate)-new Date(a.weekStartDate));
      const latest = es[0];
      if (!latest) return `<td style="text-align:center; color:#cbd5e1; padding:8px;">미작성</td>`;
      const done = latest.weekStartDate >= thisMonday;
      const pa = avg(latest.playerScores), ca = avg(latest.coachScores);
      pSum+=pa; pCnt++; cSum+=ca; cCnt++;
      return `<td style="text-align:center; padding:8px;">
        <div style="font-size:10px; color:${done?'#16a34a':'#ef4444'}; font-weight:bold;">${done?'✔ 이번주 작성':'⚠ '+(latest.weekLabel||latest.weekStartDate)}</div>
        <div style="font-size:10.5px;">선수 ${pa} · 지도자 ${ca}</div></td>`;
    }).join('');
    return `<tr style="border-bottom:1px solid #eee;"><td style="font-weight:bold; padding:8px; white-space:nowrap;">
      ${p.photo?`<img src="${p.photo}" style="width:22px;height:22px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:6px;">`:''}${p.name}</td>${cells}</tr>`;
  }).join('');

  document.getElementById('dashboardCard').innerHTML = `
    <h2 style="margin:0 0 4px;">전체 대시보드</h2>
    <div style="font-size:11px; color:#64748b; margin-bottom:16px;">이번 주(${thisMonday}~) 기준 작성 현황</div>
    <div style="display:flex; gap:14px; margin-bottom:20px; flex-wrap:wrap;">
      <div style="flex:1; min-width:140px; background:#fff5f5; border:1px solid #f1948a; border-radius:8px; padding:14px; text-align:center;">
        <div style="font-size:11px; color:#64748b;">팀 평균 (선수 자가평가)</div><div style="font-size:24px; font-weight:900; color:var(--red);">${pCnt?Math.round(pSum/pCnt*10)/10:0}</div></div>
      <div style="flex:1; min-width:140px; background:#f8fafc; border:1px solid #cbd5e1; border-radius:8px; padding:14px; text-align:center;">
        <div style="font-size:11px; color:#64748b;">팀 평균 (지도자 평가)</div><div style="font-size:24px; font-weight:900;">${cCnt?Math.round(cSum/cCnt*10)/10:0}</div></div>
    </div>
    <div style="overflow-x:auto;"><table style="width:100%; border-collapse:collapse; font-size:11.5px; min-width:600px;">
      <thead><tr style="background:var(--black); color:white;"><th style="padding:8px; text-align:left;">선수</th>${types.map(t=>`<th style="padding:8px;">${JOURNAL_TYPES[t].title}</th>`).join('')}</tr></thead>
      <tbody>${rows || `<tr><td colspan="${types.length+1}" style="text-align:center; color:#94a3b8; padding:20px;">등록된 선수가 없습니다.</td></tr>`}</tbody>
    </table></div>`;
}

/* ---------- 주기화별로 보기 ---------- */
async function showByType(){
  hidePanels(); document.getElementById('byTypeWrapper').style.display = 'block';
  document.getElementById('byTypeCard').innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">불러오는 중...</div>';
  const res = await api({ action:'getAllData', requesterId: currentUser.id });
  if (!res.ok) { document.getElementById('byTypeCard').innerHTML = `<div style="color:#ef4444;">${res.error}</div>`; return; }
  byTypeCache = res;
  const types = Object.keys(JOURNAL_TYPES);
  document.getElementById('byTypeCard').innerHTML = `
    <h2 style="margin:0 0 14px;">주기화별로 보기</h2>
    <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px;">
      <select id="byTypeType" onchange="onByTypeTypeChange()">${types.map(t=>`<option value="${t}">${JOURNAL_TYPES[t].title}</option>`).join('')}</select>
      <select id="byTypeWeek" onchange="onByTypeWeekChange()"><option value="">-- 저장된 주차에서 선택 --</option></select>
      <span style="font-size:11px; color:#94a3b8;">또는</span>
      <input type="date" id="byTypeDate" onchange="onByTypeDateChange()">
    </div>
    <div id="byTypeResults"></div>`;
  refreshByTypeWeeks();
}
function refreshByTypeWeeks(){
  const type = document.getElementById('byTypeType').value;
  const map = {};
  byTypeCache.entries.filter(e=>e.type===type).forEach(e => map[e.weekStartDate] = e.weekLabel || e.weekStartDate);
  const weeks = Object.keys(map).sort((a,b)=> new Date(b)-new Date(a));
  document.getElementById('byTypeWeek').innerHTML = '<option value="">-- 저장된 주차에서 선택 --</option>' + weeks.map(w=>`<option value="${w}">${map[w]} (${w})</option>`).join('');
}
function onByTypeTypeChange(){ refreshByTypeWeeks(); document.getElementById('byTypeDate').value=''; document.getElementById('byTypeResults').innerHTML=''; }
function onByTypeWeekChange(){
  const w = document.getElementById('byTypeWeek').value; document.getElementById('byTypeDate').value='';
  if (w) renderByTypeResults(document.getElementById('byTypeType').value, w); else document.getElementById('byTypeResults').innerHTML='';
}
function onByTypeDateChange(){
  const d = document.getElementById('byTypeDate').value; document.getElementById('byTypeWeek').value='';
  if (d) renderByTypeResults(document.getElementById('byTypeType').value, d);
}
function renderByTypeResults(type, week){
  const players = byTypeCache.users.filter(u=>u.role==='player');
  const submitted = [], missing = [];
  players.forEach(p => {
    const entry = byTypeCache.entries.find(e => e.playerId===p.id && e.type===type && e.weekStartDate===week);
    (entry ? submitted.push({p,entry}) : missing.push(p));
  });
  document.getElementById('byTypeResults').innerHTML = `
    <div style="display:flex; gap:24px; flex-wrap:wrap;">
      <div style="flex:1; min-width:220px;"><h4 style="color:#16a34a;">✔ 제출함 (${submitted.length})</h4>
        ${submitted.length ? submitted.map(s=>`<div class="list-item" style="cursor:pointer;" onclick="openByTypeEntry('${s.p.id}','${esc(s.p.name)}','${s.entry.entryId}')">
          <span>${s.p.photo?`<img src="${s.p.photo}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:6px;">`:''}${s.p.name}</span>
          <span style="font-size:10px; color:#64748b;">선수 ${avg(s.entry.playerScores)} · 지도자 ${avg(s.entry.coachScores)}</span></div>`).join('') : '<div style="font-size:11.5px; color:#94a3b8;">없음</div>'}</div>
      <div style="flex:1; min-width:220px;"><h4 style="color:#ef4444;">⚠ 미제출 (${missing.length})</h4>
        ${missing.length ? missing.map(p=>`<div class="list-item" style="opacity:.55;"><span>${p.photo?`<img src="${p.photo}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:6px;">`:''}${p.name}</span></div>`).join('') : '<div style="font-size:11.5px; color:#94a3b8;">없음</div>'}</div>
    </div>`;
}
function openByTypeEntry(playerId, playerName, entryId){
  const entry = byTypeCache.entries.find(e => e.entryId === entryId); if (!entry) return;
  currentPlayerId = playerId; currentPlayerName = playerName; currentType = entry.type;
  currentEntry = JSON.parse(JSON.stringify(entry));
  currentEntry.playerComment = currentEntry.playerComment || '';
  currentEntry.coachFeedback = currentEntry.coachFeedback || '';
  renderJournal();
}

/* ---------- 성장 추이 ---------- */
async function showGrowthChart(){
  if (!currentPlayerId) { alert('먼저 선수를 선택해주세요.'); return; }
  const res = await api({ action:'getAllData', requesterId: currentUser.id });
  if (!res.ok) { alert(res.error); return; }
  const entries = res.entries.filter(e => e.playerId===currentPlayerId && e.type===currentType && e.playerScores)
    .sort((a,b)=> new Date(a.weekStartDate)-new Date(b.weekStartDate));
  document.getElementById('growthModal').style.display = 'flex';
  if (entries.length < 2) { document.getElementById('growthEmpty').style.display='block'; document.getElementById('growthCanvas').style.display='none'; return; }
  document.getElementById('growthEmpty').style.display = 'none';
  document.getElementById('growthCanvas').style.display = 'block';
  const labels = entries.map(e => e.weekLabel || e.weekStartDate);
  if (growthChart) growthChart.destroy();
  growthChart = new Chart(document.getElementById('growthCanvas'), {
    type:'line',
    data:{ labels, datasets:[
      { label:'선수 자가평가 평균', data: entries.map(e=>avg(e.playerScores)), borderColor:'#E30613', backgroundColor:'rgba(227,6,19,.1)', tension:.25 },
      { label:'지도자 평가 평균', data: entries.map(e=>avg(e.coachScores)), borderColor:'#1a1a1a', backgroundColor:'rgba(26,26,26,.06)', tension:.25 }
    ]},
    options:{ responsive:true, scales:{ y:{ min:0, max:5 } }, plugins:{ legend:{ position:'bottom' } } }
  });
}
function closeGrowthChart(){ document.getElementById('growthModal').style.display = 'none'; }

/* ---------- 주기화 일지 렌더링 ---------- */
function renderJournal(){
  hidePanels(); document.getElementById('journalWrapper').style.display = 'block';
  const isPlayer = currentUser.role === 'player', isCoach = currentUser.role === 'coach';
  const cats = JOURNAL_TYPES[currentEntry.type].categories;

  document.getElementById('journalActionsRow').innerHTML = `
    ${isCoach ? `<button style="background:#0284c7" onclick="exportPNG()"><i class="fa fa-image"></i> PNG 저장</button>
    <button style="background:var(--black)" onclick="window.print()"><i class="fa fa-print"></i> PDF 저장</button>` : ''}
    <button style="background:#16a34a" onclick="saveEntry()"><i class="fa fa-save"></i> 저장</button>`;

  const photo = isPlayer ? (currentUser.photo||'') : ((playersInfo[currentPlayerId]||{}).photo||'');
  let html = `<div class="j-title">${photo?`<img src="${photo}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:8px;border:2px solid var(--gold);">`:''}${JOURNAL_TYPES[currentEntry.type].title} — ${currentEntry.playerName||''}</div>`;
  html += `<div class="j-meta">${currentEntry.weekLabel||''} · 시작일: ${currentEntry.weekStartDate}</div>`;
  html += `<table class="j-table"><thead><tr><th>선수,지도자 (${currentEntry.weekLabel||''})</th>${cats.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;

  DAYS.forEach(d => {
    html += `<tr class="goal-row"><td>개인 목적 (${d})</td>`;
    cats.forEach((c, ci) => {
      const val = (currentEntry.goals[d]||[])[ci] || '';
      html += `<td class="goal-cell"><textarea data-day="${d}" data-ci="${ci}" onchange="updateGoal(this)" ${isPlayer?'':'disabled'}>${esc(val)}</textarea></td>`;
    });
    html += `</tr>`;
  });

  html += `<tr class="score-row"><td>선수</td>${cats.map((c,ci)=>`<td>${tapHtml('player', ci, currentEntry.playerScores[ci]||0, !isPlayer)}</td>`).join('')}</tr>`;
  html += `<tr class="score-row"><td>지도자</td>${cats.map((c,ci)=>`<td>${tapHtml('coach', ci, currentEntry.coachScores[ci]||0, !isCoach)}</td>`).join('')}</tr>`;

  html += `<tr class="video-row"><td>영상</td>`;
  cats.forEach((c, ci) => {
    const v = currentEntry.videos[ci] || {url:''};
    html += `<td><div class="video-cell">
      <input type="text" placeholder="링크 붙여넣기" value="${esc(v.url||'')}" data-ci="${ci}" onchange="updateVideo(this)">
      <div style="display:flex; gap:4px; align-items:center;">
        <button onclick="document.getElementById('vf${ci}').click()">파일 업로드</button>
        <input type="file" id="vf${ci}" accept="video/mp4,video/quicktime" style="display:none" data-ci="${ci}" onchange="uploadVideo(this)">
      </div>
      ${v.url ? `<a href="${v.url}" target="_blank">▶ 영상보기</a>` : ''}
    </div></td>`;
  });
  html += `</tr></tbody></table>`;

  html += `<div class="legend-row">${cats.map((c,i)=>`<div><span class="dot" style="background:${PALETTE[i]}"></span>${c}</div>`).join('')}</div>`;
  html += `<div class="charts-row"><div class="chart-box"><h4>선수 자가평가 비율</h4><canvas id="playerPie"></canvas></div><div class="chart-box"><h4>지도자 평가 비율</h4><canvas id="coachPie"></canvas></div></div>`;

  html += `<div class="note-box" style="background:#fff8f5; border-color:var(--red);">
    <div style="font-size:12.5px; font-weight:900; color:var(--red); margin-bottom:6px;">✏️ 선수 의견 / 생각</div>
    <textarea rows="3" onchange="updatePlayerComment(this)" ${isPlayer?'':'disabled'} placeholder="이번 주 느낀 점, 다음 목표 등을 적어보세요.">${esc(currentEntry.playerComment)}</textarea></div>`;
  html += `<div class="note-box" style="background:#f8fafc; border-color:var(--gold);">
    <div style="font-size:12.5px; font-weight:900; margin-bottom:6px;">🗣 지도자 피드백</div>
    <textarea rows="3" onchange="updateCoachFeedback(this)" ${isCoach?'':'disabled'} placeholder="피드백과 다음 주 보완점을 적어주세요.">${esc(currentEntry.coachFeedback)}</textarea></div>`;

  document.getElementById('journalCard').innerHTML = html;
  drawPies(cats);
}

function tapHtml(row, ci, value, disabled){
  let html = `<div class="tap-row">`;
  for (let i=1;i<=5;i++) {
    const on = Math.floor(value)===i && value>0;
    const half = on && value%1!==0;
    html += `<button type="button" class="tap-btn ${on?'active':''} ${half?'half':''}" ${disabled?'disabled':''} onclick="tapScore('${row}',${ci},${i})">${i}</button>`;
  }
  return html + `<span class="tap-val">${value||0}</span></div>`;
}
function tapScore(row, ci, i){
  if ((row==='player') !== (currentUser.role==='player')) return;
  const arr = row==='player' ? currentEntry.playerScores : currentEntry.coachScores;
  const cur = arr[ci]||0;
  arr[ci] = (Math.floor(cur)===i && cur>0) ? (cur%1!==0 ? 0 : i+0.5) : i;
  renderJournal(); scheduleAutoSave();
}

function updateGoal(el){ currentEntry.goals[el.dataset.day][parseInt(el.dataset.ci)] = el.value; scheduleAutoSave(); }
function updateVideo(el){ currentEntry.videos[parseInt(el.dataset.ci)] = { url: el.value }; scheduleAutoSave(); }
function updatePlayerComment(el){ currentEntry.playerComment = el.value; scheduleAutoSave(); }
function updateCoachFeedback(el){ currentEntry.coachFeedback = el.value; scheduleAutoSave(); }

async function uploadVideo(el){
  const file = el.files[0]; if (!file) return;
  if (file.size > 25*1024*1024) alert('25MB 초과 파일은 업로드가 원활하지 않을 수 있어요.');
  const ci = parseInt(el.dataset.ci);
  const reader = new FileReader();
  reader.onload = async ev => {
    const res = await api({ action:'uploadFile', base64: ev.target.result, filename: file.name, mimeType: file.type });
    if (res.ok) { currentEntry.videos[ci] = { url: res.viewUrl }; renderJournal(); alert('업로드 완료!'); }
    else alert('업로드 실패: ' + res.error);
  };
  reader.readAsDataURL(file);
}

function drawPies(cats){
  const pSum = currentEntry.playerScores.reduce((a,b)=>a+b,0) || 1;
  const cSum = currentEntry.coachScores.reduce((a,b)=>a+b,0) || 1;
  const pData = currentEntry.playerScores.map(v=> Math.round(v/pSum*1000)/10);
  const cData = currentEntry.coachScores.map(v=> Math.round(v/cSum*1000)/10);
  if (playerChart) playerChart.destroy();
  if (coachChart) coachChart.destroy();
  const opts = { responsive:true, plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>c.label+': '+c.parsed+'%'}} } };
  playerChart = new Chart(document.getElementById('playerPie'), { type:'pie', data:{ labels:cats, datasets:[{ data:pData, backgroundColor:PALETTE }] }, options:opts });
  coachChart = new Chart(document.getElementById('coachPie'), { type:'pie', data:{ labels:cats, datasets:[{ data:cData, backgroundColor:PALETTE }] }, options:opts });
}

/* ---------- 저장 / 자동저장 / 내보내기 ---------- */
async function saveEntry(){
  if (!currentEntry) return;
  const res = await api({ action:'saveEntry', entry: currentEntry, editedBy: currentUser.id });
  if (res.ok) { currentEntry.entryId = res.entryId; alert('저장되었습니다.'); loadArchive(); }
  else alert('저장 실패: ' + res.error);
}
function scheduleAutoSave(){
  if (!currentEntry) return;
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(async () => {
    const res = await api({ action:'saveEntry', entry: currentEntry, editedBy: currentUser.id }, true);
    if (res.ok) { currentEntry.entryId = res.entryId; toast('자동저장됨'); }
  }, 2000);
}

async function exportPNG(){
  const canvas = await html2canvas(document.getElementById('journalCard'), { scale:2, useCORS:true, backgroundColor:'#ffffff' });
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png'); a.download = `훈련일지_${currentEntry.playerName}_${currentEntry.weekStartDate}.png`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

async function exportExcel(){
  const res = await api({ action:'getAllData', requesterId: currentUser.id });
  if (!res.ok) { alert(res.error); return; }
  const summary = res.entries.map(e => ({
    선수: e.playerName, 유형: (JOURNAL_TYPES[e.type]||{}).title || e.type, 주차: e.weekLabel, 시작일: e.weekStartDate,
    선수평균: avg(e.playerScores), 지도자평균: avg(e.coachScores), 선수의견: e.playerComment||'', 지도자피드백: e.coachFeedback||'', 수정일: e.updatedAt
  }));
  const users = res.users.map(u => ({ 아이디:u.id, 이름:u.name, 역할:u.role==='player'?'선수':'지도자', 전체조회권한:u.granted?'O':'X' }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summary), "일지요약");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(users), "사용자");
  XLSX.writeFile(wb, `FC_SEOUL_훈련일지_백업_${dateStr(new Date())}.xlsx`);
}
</script>
</body>
</html>
